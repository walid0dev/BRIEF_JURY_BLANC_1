info:
  name: register
  type: http
  seq: 2

http:
  method: POST
  url: "{{URL}}register"
  body:
    type: json
    data: |-
      {
        "name":"{{$randomFullName}}",
        "email":"{{$randomEmail}}",
        "password":"12345678",
        "password_confirmation":"12345678"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
