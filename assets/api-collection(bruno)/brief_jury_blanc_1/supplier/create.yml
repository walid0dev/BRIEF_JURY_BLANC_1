info:
  name: create supplier
  type: http
  seq: 3

http:
  method: POST
  url: "{{URL}}"
  body:
    type: json
    data: |-
      {
        "name": "{{$randomCompanyName}}",
        "email": "{{$randomEmail}}",
        "phone": "{{$randomPhoneNumber}}",
        "address": "{{$randomCatchPhrase}}",
        "contact": "{{$randomNamePrefix}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
